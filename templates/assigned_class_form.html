{% extends 'base.html' %}

{% block content %}
<style>
    .uni-h1 {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 1.5rem;
        color: hsl(0, 56%, 98%);
    }
    
    .uni-form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        margin-top: 1rem;
    }
    
    .uni-form-group {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
    }
    
    .uni-form-group label {
        font-size: 1rem;
        margin-bottom: 0.5rem;
        color: hsl(0, 50%, 95%);
    }
    
    .uni-form-group input, .uni-form-group select {
        padding: 0.75rem;
        font-size: 1rem;
        border-radius: 5px;
        border: 1px solid #ccc;
        width: 100%;
        box-sizing: border-box;
    }
    
    .uni-form-group input:focus, .uni-form-group select:focus {
        border-color: #007bff;
        outline: none;
    }
    
    .uni-btn {
        padding: 0.75rem 2rem;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        width: 100%;
        max-width: 200px;
        text-align: center;
    }
    
    .uni-btn-success {
        background-color: #28a745;
        color: white;
        border: none;
    }
    
    .uni-btn-success:hover {
        background-color: #218838;
    }
    
    .uni-btn-secondary {
        background-color: hsl(56, 94%, 52%);
        color: white;
        border: none;
    }
    
    .uni-btn-secondary:hover {
        background-color: hsl(180, 8%, 97%);
    }
</style>

<h1 class="uni-h1">{% if assigned_class %}Update{% else %}Assign{% endif %} Teacher To Class</h1>
<form method="post" class="uni-form">
    {% csrf_token %}
    
    <div class="uni-form-group">
        <label for="teacher_id">Teacher:</label>
        <select id="teacher_id" name="teacher_id" class="form-control" required>
            <option value="" disabled selected>Select a Teacher</option>
            {% for teacher in teachers %}
            <option value="{{ teacher.id }}" {% if assigned_class and assigned_class.teacher.id == teacher.id %}selected{% endif %}>{{ teacher.name }} ({{ teacher.department.name }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="uni-form-group">
        <label for="course_id">Course/Subject:</label>
        <select id="course_id" name="course_id" class="form-control" required>
            <option value="" disabled selected>Select a Course</option>
            {% for course in courses %}
            <option value="{{ course.id }}" {% if assigned_class and assigned_class.course.id == course.id %}selected{% endif %}>{{ course.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="uni-form-group">
        <label for="department_id">Department:</label>
        <select id="department_id" name="department_id" class="form-control" required>
            <option value="" disabled selected>Select an Assigned Department</option>
            {% for dep in departments %}
            <option value="{{ dep.id }}" {% if assigned_class and assigned_class.department.id == dep.id %}selected{% endif %}>{{ dep.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="uni-form-group">
        <label for="semester_id">Semester:</label>
        <select id="semester_id" name="semester_id" class="form-control" required>
            <option value="" disabled selected>Select a Semester</option>
            {% for sem in semesters %}
            <option value="{{ sem.id }}" {% if assigned_class and assigned_class.semester.id == sem.id %}selected{% endif %}>{{ sem.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="uni-form-group">
        <label for="camera_ids">Link Classroom Camera Setup (Optional):</label>
        <select id="camera_ids" name="camera_ids" class="form-control" multiple style="min-height: 100px;">
            {% for cam in cameras %}
            <option value="{{ cam.id }}" {% if assigned_class and cam in assigned_class.cameras.all %}selected{% endif %}>{{ cam.name }} - {{ cam.location }}</option>
            {% endfor %}
        </select>
        <small style="color: #aaa; margin-top: 5px;">Hold Ctrl to select multiple cameras.</small>
    </div>

    <button type="submit" class="uni-btn uni-btn-success">Save Assignment</button>
    <a href="{% url 'assigned_class_list' %}" class="uni-btn uni-btn-secondary">Cancel</a>
</form>

{% endblock %}
