{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block extra_css %}
<style>
    .not-found-wrap {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
    }

    .not-found-card {
        max-width: 760px;
        width: 100%;
        border-radius: 20px;
        border: 1px solid #1E3A8A;
        background: radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.22), transparent 40%), #020817;
        box-shadow: 0 18px 50px rgba(2, 6, 23, 0.45);
        color: #E2E8F0;
        padding: 56px 44px;
        text-align: center;
    }

    .not-found-code {
        margin: 0;
        font-size: clamp(3rem, 8vw, 5.5rem);
        line-height: 1;
        font-weight: 800;
        color: #22D3EE;
        letter-spacing: 0.04em;
    }

    .not-found-title {
        margin: var(--space-4) 0 var(--space-2);
        font-size: 1.6rem;
        font-weight: 700;
        color: #F8FAFC;
    }

    .not-found-text {
        margin: 0;
        color: #94A3B8;
        font-size: 1rem;
    }

    .not-found-actions {
        margin-top: var(--space-6);
        display: flex;
        justify-content: center;
        gap: var(--space-3);
        flex-wrap: wrap;
    }

    .nf-btn-primary {
        background: linear-gradient(90deg, #14B8A6, #6366F1);
        color: #FFFFFF;
        border: 1px solid transparent;
    }

    .nf-btn-secondary {
        background: transparent;
        color: #E2E8F0;
        border: 1px solid #334155;
    }
</style>
{% endblock %}

{% block content %}
<div class="not-found-wrap">
    <div class="not-found-card">
        <p class="not-found-code">404</p>
        <h1 class="not-found-title">Page Not Found</h1>
        <p class="not-found-text">The link you opened does not exist, was moved, or is no longer available.</p>

        <div class="not-found-actions">
            <a href="{% url 'home' %}" class="saas-btn nf-btn-primary">
                <i class="fas fa-home"></i> Back To Home
            </a>
            <a href="{% url 'admin_dashboard' %}" class="saas-btn nf-btn-secondary">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
