{% extends 'base.html' %}

{% block content %}
<style>
    .uni-h1 {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 1.5rem;
        color: hsl(0, 56%, 98%);
    }

    .uni-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 2px solid hsl(0, 68%, 62%);
        padding: 2rem;
        border-radius: 10px;
        max-width: 500px;
        margin: 0 auto;
        background-color: hsl(0, 48%, 91%);
    }

    .uni-p {
        font-size: 1.25rem;
        color: hsl(0, 50%, 5%);
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .uni-strong {
        font-weight: bold;
        color: #d9534f;
    }

    .uni-actions {
        display: flex;
        gap: 1rem;
    }

    .uni-btn {
        padding: 0.75rem 2rem;
        font-size: 1rem;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
    }

    .uni-btn-danger {
        background-color: #dc3545;
        color: white;
        border: none;
    }

    .uni-btn-danger:hover {
        background-color: #c82333;
    }

    .uni-btn-secondary {
        background-color: #6c757d;
        color: white;
        text-decoration: none;
    }

    .uni-btn-secondary:hover {
        background-color: #5a6268;
    }
</style>

<h1 class="uni-h1">Delete Teacher</h1>

<div class="uni-container">
    <p class="uni-p">Are you sure you want to delete the teacher <span class="uni-strong">"{{ teacher.name }}"</span>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="uni-actions">
            <button type="submit" class="uni-btn uni-btn-danger">Yes, Delete</button>
            <a href="{% url 'teacher_list' %}" class="uni-btn uni-btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
